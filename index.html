<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Niji — Prototype Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Klee+One&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── ADD / EDIT MODAL ── -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Prototype</div>
      <button class="modal-close" onclick="closeModal()">✕ close</button>
    </div>

    <form id="proto-form" onsubmit="saveProto(event)">
      <input type="hidden" id="edit-id">

      <!-- Identity -->
      <div class="form-section">
        <div class="form-section-label">Identity</div>
        <div class="form-grid">
          <div class="field">
            <label>Prototype Name</label>
            <input type="text" id="f-name" placeholder="e.g. Steel Coil Cuff No.1" required>
          </div>
          <div class="field">
            <label>Category</label>
            <select id="f-category">
              <option value="">— select —</option>
              <option>Bracelet</option>
              <option>Necklace</option>
              <option>Earrings</option>
              <option>Ring</option>
              <option>Accessory</option>
              <option>Incense</option>
              <option>Ritual Object</option>
              <option>Loofah / Sponge</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label>Date Made</label>
            <input type="date" id="f-date">
          </div>
          <div class="field">
            <label>Model</label>
            <input type="text" id="f-model" placeholder="Prototype Model Name/Code">
          </div>
        </div>
      </div>

      <!-- Materials -->
      <div class="form-section">
        <div class="form-section-label">Materials Used</div>
        <div class="field">
          <label>Primary material (the string — from log ID if possible)</label>
          <div class="material-input-group">
            <input type="text" id="mat-primary-input" placeholder="e.g. Steel wound guitar string · N003">
            <button type="button" onclick="addPrimary()">Set Primary</button>
          </div>
        </div>
        <div class="field" style="margin-top:10px;">
          <label>Additional materials</label>
          <div class="material-input-group">
            <input type="text" id="mat-extra-input" placeholder="e.g. Waxed linen thread · brown">
            <button type="button" onclick="addMaterial()">+ Add</button>
          </div>
        </div>
        <div class="mat-chips" id="mat-chips"></div>
        <input type="hidden" id="f-materials">
      </div>

      <!-- Time & Effort -->
      <div class="form-section">
        <div class="form-section-label">Time & Effort</div>
        <div class="form-grid cols-3">
          <div class="field">
            <label>Time Taken (hrs)</label>
            <input type="text" id="f-time" placeholder="e.g. 1h 30m">
          </div>
          <div class="field">
            <label>Difficulty</label>
            <select id="f-difficulty">
              <option value="">— select —</option>
              <option>Easy — repeatable quickly</option>
              <option>Normal</option>
              <option>Medium — needs focus</option>
              <option>Hard — slow, complex</option>
              <option>Very hard — not scalable yet</option>
            </select>
          </div>
          <div class="field">
            <label>Est. Material Cost</label>
            <input type="text" id="f-cost" placeholder="e.g. $2.50 or ~€3">
          </div>
        </div>
      </div>

      <!-- What Worked -->
      <div class="form-section">
        <div class="form-section-label">What Worked</div>
        <div class="field">
          <label>Add one thing at a time</label>
          <div class="list-input-group">
            <input type="text" id="worked-input" placeholder="e.g. The coiling technique held tension well">
            <button type="button" onclick="addWorked()">+ Add</button>
          </div>
        </div>
        <ul class="dynamic-list" id="worked-list"></ul>
        <input type="hidden" id="f-worked">
      </div>

      <!-- What Didn't Work -->
      <div class="form-section">
        <div class="form-section-label">What Didn't Work</div>
        <div class="field">
          <label>Add one thing at a time</label>
          <div class="list-input-group">
            <input type="text" id="didnt-input" placeholder="e.g. Clasp slipped under tension">
            <button type="button" onclick="addDidnt()">+ Add</button>
          </div>
        </div>
        <ul class="dynamic-list" id="didnt-list"></ul>
        <input type="hidden" id="f-didnt">
      </div>

      <!-- Verdict -->
      <div class="form-section">
        <div class="form-section-label">Verdict</div>
        <div class="form-grid">
          <div class="field">
            <label>Made the Cut?</label>
            <select id="f-verdict">
              <option value="wip">Still in progress</option>
              <option value="cut">✓ Yes — in the collection</option>
              <option value="maybe">~ Maybe — needs revision</option>
              <option value="no">✗ No — retired</option>
            </select>
          </div>
          <div class="field">
            <label>Suggested Retail Price</label>
            <input type="text" id="f-price" placeholder="e.g. $45 or leave blank">
          </div>
        </div>
        <div class="form-grid full" style="margin-top:12px;">
          <div class="field">
            <label>Verdict Note — why, and what to do next</label>
            <textarea id="f-verdict-note" placeholder="e.g. Strong design but clasp needs redesigning. Try a leather loop next iteration."></textarea>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Prototype</button>
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- ── MAIN ── -->
<div class="shell">

  <header class="header">
    <div>
      <div class="brand">Niji</div>
      <div class="brand-sub">Prototype Journal</div>
    </div>
    <div class="proto-count">
      <strong id="total-count">0</strong>
      prototypes logged
    </div>
  </header>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-cell">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num cut" id="stat-cut">0</div>
      <div class="stat-label">In Collection</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num maybe" id="stat-maybe">0</div>
      <div class="stat-label">Needs Revision</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num no" id="stat-no">0</div>
      <div class="stat-label">Retired</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num wip" id="stat-wip">0</div>
      <div class="stat-label">In Progress</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openModal()">+ New Prototype</button>
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('cut', this)">Collection</button>
      <button class="filter-btn" onclick="setFilter('maybe', this)">Revision</button>
      <button class="filter-btn" onclick="setFilter('wip', this)">In Progress</button>
      <button class="filter-btn" onclick="setFilter('no', this)">Retired</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('journal', this)">Journal</button>
      <button class="view-btn" onclick="setView('grid', this)">Grid</button>
    </div>
    <button class="btn btn-print" onclick="window.print()">⎙ Print</button>
  </div>

  <!-- Journal view -->
  <div id="journal-view">
    <div class="journal-pages" id="journal-pages"></div>
  </div>

  <!-- Grid view -->
  <div id="grid-view">
    <div class="grid-pages" id="grid-pages"></div>
  </div>

</div>

<script src="app.js" async></script>
</body>
</html>
